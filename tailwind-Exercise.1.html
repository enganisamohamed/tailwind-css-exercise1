<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tailwind Card</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white shadow-lg rounded-lg w-[800px] flex overflow-hidden">

    <div class="w-[300px]">
      <img 
        src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?q=80&w=800&auto=format&fit=crop" 
        alt="Camera"
        class="w-full h-full object-cover"
      />
    </div>

    <div class="p-8 flex flex-col justify-center">
      <h1 class="text-4xl font-bold mb-4">
      </h1>

      <p class="text-gray-600 text-lg mb-6 max-w-md">
        This is the card description that explains more about the item.
      </p>

      <button class="bg-pink-500 hover:bg-pink-600 text-white px-6 py-3 rounded font-semibold w-fit transition">
        Learn More
      </button>
    </div>

  </div>

</body>
</html>
